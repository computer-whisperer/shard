id = "narrow"
name = "Narrow (proving-bootstrap)"
description = "Syntax highlighting for the v2 proving-bootstrap narrow object language (kernel/*.shard). See docs/LANGUAGE.md."
version = "0.0.1"
schema_version = 1
authors = ["proving-bootstrap-v2"]
repository = "https://example.invalid/proving-bootstrap-v2"

# Reuses the Scheme tree-sitter grammar for sexp shape; our custom
# highlights.scm targets our specific keywords (fn, type, match, …).
# If you want this pinned to a vendored grammar instead, point
# `path = "./grammars/scheme"` and drop the repository/commit pair.
[grammars.scheme]
repository = "https://github.com/6cdh/tree-sitter-scheme"
# Same commit pinned by zed-extensions/scheme (the official extension)
# at the time of writing — known to compile under Zed.
commit = "af0fd1fa452cb2562dc7b5c8a8c55551c39273b9"
