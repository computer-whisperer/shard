[package]
name = "shard-viewer"
version = "0.1.0"
edition = "2024"
description = "A graphical navigator for shard source — draws methods and systems as flow charts"
license = "MIT OR Apache-2.0"
publish = false

# Independent of the shard rust_bootstrap: this tool does its own shard
# parsing (a lightweight structural s-expr reader, NOT the kernel elaborator)
# so it never burdens the bootstrap checker.

[lib]
name = "shard_viewer"
path = "src/lib.rs"

# Fast-iterating text dump of the extracted graph — no GUI deps, so the
# parser can be exercised against the whole corpus without compiling damascene.
[[bin]]
name = "shard-graph"
path = "src/bin/graph.rs"

[dependencies]
