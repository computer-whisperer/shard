# The corpus gate as an async checkmark per commit.
#
# The corpus (run_corpus.sh) is a FAIL-set diff tool: red targets are
# pinned reject fixtures, and the gate fails only when the FAIL-set
# drifts from fails-base.txt. CI runs the FULL corpus including the
# embedded lowering-driver leg (interactive cycles skip it locally via
# SKIP_LOWERING=1 after running the driver directly).
#
# TWO JOBS, TWO RUNNERS. The engine build does not need the corpus
# machine: the `engine` job runs UNTAGGED (any runner) and builds BOTH
# fast engines (`bin/rebuild.sh check` — shard_eval, then shard_check
# compiled by it). The `corpus` job runs on the high-cpu machine.
#
# HAND-OFF IS ARTIFACTS, NOT CACHE: this GitLab has no shared cache
# server, so each runner's cache is LOCAL — a cache written by the
# engine runner is invisible to the corpus runner. The engine job
# publishes the four engine files as artifacts; `needs: [engine]`
# downloads them into the corpus job wherever it runs. Each job still
# keeps a local cache for its own run-to-run warm start (cargo target,
# engines for the fast-boot rebuild path). GitLab uploads neither cache
# nor artifacts on a TIMED-OUT job (measured, #44/#45) — the engine
# job's own generous timeout is what guarantees the artifacts land.
# The one-time cold bootstrap (Rust interpreter builds gen-1) is slow
# on a small runner; every later rebuild fast-boots from the cached
# previous engine and only runs when kernel sources actually changed
# (stamp check).

stages:
  - engine
  - gate

# The engine job is deliberately NOT interruptible: the one-time cold
# bootstrap (Rust interpreter compiles both engines; ~5-6h on the
# small runner) must run to completion ONCE to seed the runner-local
# cache -- auto-cancel on push was killing it mid-build every time
# (#54: 96m, #55: 108m), so the cache never landed. Warm runs are a
# stamp check (~minutes) and never block the pipeline long.
engine:
  stage: engine
  image: docker.io/library/rust:latest
  timeout: 8h
  resource_group: engine-build
  cache:
    key: shard-engine
    paths:
      - rust_bootstrap/target/
      - bin/shard_check
      - bin/shard_check.stamp
      - bin/shard_eval
      - bin/shard_eval.stamp
  script:
    - echo "runner cores:" $(nproc) && (free -g || true)
    - cargo build --release --manifest-path rust_bootstrap/Cargo.toml
    - |
      if [ ! -x bin/shard_check ] || [ "$(bin/engine_stamp.sh)" != "$(cat bin/shard_check.stamp 2>/dev/null)" ]; then
        echo "engine stale or missing -- rebuilding (check mode: both engines)"
        bin/rebuild.sh check
      else
        echo "engine fresh (stamp match) -- rebuild skipped"
      fi
  artifacts:
    paths:
      - bin/shard_check
      - bin/shard_check.stamp
      - bin/shard_eval
      - bin/shard_eval.stamp
    expire_in: 7 days

corpus:
  stage: gate
  tags:
    - high-cpu
  image: docker.io/library/rust:latest
  timeout: 6h
  interruptible: true
  rules:
    - if: $PIO_DEEP == "1"
      when: never
    - if: $CORPUS_LONG == "1"
      when: never
    - when: on_success
  needs:
    - engine
  cache:
    key: shard-engine
    policy: pull
    paths:
      - rust_bootstrap/target/
      - bin/shard_check
      - bin/shard_check.stamp
      - bin/shard_eval
      - bin/shard_eval.stamp
  before_script:
    - apt-get update -qq && apt-get install -y -qq nodejs > /dev/null
  script:
    - echo "runner cores:" $(nproc) && (free -g || true)
    - cargo build --release --manifest-path rust_bootstrap/Cargo.toml
    - |
      if [ ! -x bin/shard_check ] || [ "$(bin/engine_stamp.sh)" != "$(cat bin/shard_check.stamp 2>/dev/null)" ]; then
        echo "engine stale or missing -- rebuilding (cache eviction fallback)"
        bin/rebuild.sh check
      fi
    - bash run_corpus.sh 2>&1 | tee corpus.log
    - grep '^FAIL' corpus.log | awk '{print $2}' | sort > fails-run.txt
    - "awk -F': ' '{print $2}' fails-base.txt | sort > fails-base-names.txt"
    - diff fails-run.txt fails-base-names.txt
    - echo "CORPUS == BASELINE"
  artifacts:
    paths:
      - corpus.log
    when: always
    expire_in: 30 days

# The LONG corpus: everything the default corpus runs PLUS the ~45-90 min
# block of search/PIO engine-run pins gated behind CORPUS_LONG=1 in
# run_corpus.sh.  Fire on occasion (after search-family merges, before
# baseline changes) with:  glab ci run -b main --variables CORPUS_LONG:1
# (the variable also steps the default corpus job aside).  Deliberately
# NOT interruptible: a later push must not auto-cancel a deliberate
# full sweep.
corpus-long:
  extends: corpus
  interruptible: false
  rules:
    - if: $CORPUS_LONG == "1"
      when: on_success
    - when: never
  variables:
    CORPUS_LONG: "1"

# The template-free DME first-result probe (docs/PIO.md P5c-2),
# variable-gated on any branch carrying the task (merged to main
# 2026-07-17).  Fire with:  glab ci run -b main --variables PIO_DEEP:1
# (PIO_DEEP=1 also SKIPS the corpus job -- the deep probe replaces the
# gate for that pipeline).
#
# The task's committed drive budget (50) is the fast smoke value; this
# job seds it to 38,000 — sized to the runner's 512Gi pod cap at the
# measured ~11-12 MB/decision region retention (local calibration:
# budget 6,000 peaked at 67.6 GB and exhausted with no passing region,
# so the first winner lies deeper).  Projected peak ~400 GiB; an
# in-script watchdog kills the engine below the pod limit so the log
# survives OOM territory.  Green = a winner region in the log; red =
# budget exhausted (informative — recalibrates the frontier, not a
# regression).
pio-dme-free:
  stage: gate
  tags:
    - high-cpu
  image: docker.io/library/rust:latest
  timeout: 24h
  rules:
    - if: $PIO_DEEP == "1"
      when: on_success
    - when: never
  cache:
    key: shard-engine
    paths:
      - rust_bootstrap/target/
      - bin/shard_check
      - bin/shard_check.stamp
      - bin/shard_eval
      - bin/shard_eval.stamp
  before_script:
    - apt-get update -qq && apt-get install -y -qq nodejs > /dev/null
  script:
    - cargo build --release --manifest-path rust_bootstrap/Cargo.toml
    - |
      if [ ! -x bin/shard_check ] || [ "$(bin/engine_stamp.sh)" != "$(cat bin/shard_check.stamp 2>/dev/null)" ]; then
        echo "engine stale or missing -- rebuilding"
        bin/rebuild.sh
      else
        echo "engine fresh (stamp match) -- rebuild skipped"
      fi
    - sed -i 's/(fn search_drive_budget () Int 50)/(fn search_drive_budget () Int 38000)/' tools/search/tasks/pio_dme_free.shard
    - grep -F '(fn search_drive_budget () Int 38000)' tools/search/tasks/pio_dme_free.shard
    - |
      bin/shard_eval run tools/search/typed_superpose.shard tools/search/tasks/pio_dme_free.shard > pio_dme_free.log 2>&1 &
      ENG=$!
      CAP_KB=$((490 * 1024 * 1024))
      PEAK=0; TICK=0
      while kill -0 "$ENG" 2>/dev/null; do
        RSS=$(awk '/VmRSS/{print $2}' /proc/$ENG/status 2>/dev/null)
        [ "${RSS:-0}" -gt "$PEAK" ] && PEAK=$RSS
        if [ "${RSS:-0}" -gt "$CAP_KB" ]; then
          echo "WATCHDOG: RSS ${RSS} kB over ${CAP_KB} kB cap -- killing engine"
          kill -9 "$ENG"
          break
        fi
        TICK=$((TICK + 1))
        if [ $((TICK % 10)) -eq 0 ]; then echo "watchdog: RSS ${RSS:-0} kB (peak ${PEAK} kB)"; fi
        sleep 30
      done
      wait "$ENG"; STATUS=$?
      echo "ENGINE EXIT ${STATUS}  PEAK RSS ${PEAK} kB"
      cat pio_dme_free.log
      exit "$STATUS"
  artifacts:
    paths:
      - pio_dme_free.log
    when: always
    expire_in: 30 days
